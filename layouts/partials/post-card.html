<article class="overflow-hidden rounded-2xl border border-slate-800 bg-slate-900/70 transition hover:border-slate-700 hover:bg-slate-900">
  {{ with .Params.image }}
    <a class="block overflow-hidden hover:no-underline" href="{{ $.RelPermalink }}" aria-label="Read {{ $.Title }}">
      <img class="aspect-[2.4/1] w-full object-cover transition duration-300 hover:scale-[1.02]" src="{{ . }}" alt="Cover image for {{ $.Title }}" loading="lazy">
    </a>
  {{ end }}
  <div class="p-5">
    <time class="text-sm text-slate-500" datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "Jan 2, 2006" }}</time>
    <h3 class="mt-2 text-xl font-bold tracking-tight"><a class="text-slate-100 hover:text-blue-300" href="{{ .RelPermalink }}">{{ .Title }}</a></h3>
    {{ with .Description }}<p class="mt-3 text-slate-400">{{ . }}</p>{{ else }}<p class="mt-3 text-slate-400">{{ .Summary | plainify }}</p>{{ end }}
    {{ with .Params.tags }}
      <ul class="mt-4 flex flex-wrap gap-2" aria-label="Tags">
        {{ range . }}<li><a class="font-mono text-sm text-emerald-400 hover:text-emerald-300" href="{{ (printf "tags/%s" (. | urlize)) | relURL }}">#{{ . }}</a></li>{{ end }}
      </ul>
    {{ end }}
  </div>
</article>
