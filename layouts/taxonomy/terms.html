{{ define "main" }}
<header class="page-header">
  <h1>{{ .Title }}</h1>
  <p>Browse posts by topic.</p>
</header>
<ul class="term-list">
  {{ range .Data.Terms.Alphabetical }}
    <li><a href="{{ .Page.RelPermalink }}">#{{ .Page.Title }}</a> <span>{{ .Count }}</span></li>
  {{ end }}
</ul>
{{ end }}
