{{ define "main" }}
<header class="mb-10">
  <h1 class="text-4xl font-black tracking-tight text-slate-100 sm:text-5xl">{{ .Title }}</h1>
  <p class="mt-4 text-slate-400">Browse posts by topic.</p>
</header>
<ul class="grid gap-3">
  {{ range .Data.Terms.Alphabetical }}
    <li class="flex items-center justify-between border-b border-slate-800 py-3"><a class="font-mono text-emerald-400 hover:text-emerald-300" href="{{ .Page.RelPermalink }}">#{{ .Page.Title }}</a> <span class="text-slate-500">{{ .Count }}</span></li>
  {{ end }}
</ul>
{{ end }}
