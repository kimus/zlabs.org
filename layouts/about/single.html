{{ define "main" }}
<article>
  <section class="grid gap-8 rounded-3xl border border-slate-800 bg-slate-900/70 p-6 shadow-2xl shadow-slate-950/40 sm:grid-cols-[10rem_1fr] sm:p-8">
    <div>
      <img class="aspect-square w-36 rounded-3xl border border-slate-700 object-cover shadow-xl shadow-slate-950/50 sm:w-40" src="{{ site.Params.avatar }}" alt="Portrait of {{ site.Params.author }}" loading="lazy">
    </div>
    <div class="min-w-0">
      <p class="mb-3 font-mono text-xs uppercase tracking-[0.18em] text-emerald-400">About</p>
      <h1 class="text-4xl font-black tracking-tight text-slate-100 sm:text-5xl">{{ site.Params.author }}</h1>
      <p class="mt-4 text-xl leading-snug text-slate-200">{{ site.Params.role }}</p>
      <p class="mt-3 text-slate-500">{{ site.Params.location }}</p>
      <div class="mt-6">
        {{ partial "social-links.html" (dict "variant" "label") }}
      </div>
    </div>
  </section>

  <div class="prose prose-invert mt-10 max-w-none prose-a:text-blue-400 prose-code:text-slate-100 prose-hr:border-slate-800">
    {{ .Content }}
  </div>
</article>
{{ end }}
