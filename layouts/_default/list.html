{{ define "main" }}
<header class="page-header">
  <h1>{{ .Title }}</h1>
  {{ with .Content }}<div class="content">{{ . }}</div>{{ end }}
</header>

<section class="post-list">
  {{ range .Pages.ByDate.Reverse }}
    {{ partial "post-card.html" . }}
  {{ else }}
    <p>No content found.</p>
  {{ end }}
</section>
{{ end }}
